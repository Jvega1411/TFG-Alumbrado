<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alumbrado TVITEC</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <a class="skip-link" href="#view">Saltar al contenido</a>

  <div class="shell">
    <header class="topbar" aria-label="Cabecera operativa">
      <div class="topbar-main">
        <div class="brand">
          <img src="/static/Logo.png" alt="TVITEC CRICURSA" class="logo">
          <div>
            <h1>Alumbrado TVITEC</h1>
            <p>Consola read-only</p>
          </div>
        </div>
      </div>
    </header>

    <nav class="tabs" aria-label="Vistas del dashboard">
      <button class="tab active" type="button" data-view="resumen">Consola</button>
      <button class="tab" type="button" data-view="secciones">Secciones</button>
      <button class="tab" type="button" data-view="historial">Historial</button>
      <button class="tab" type="button" data-view="tecnico">Tecnico</button>
      <button class="refresh-btn" id="refreshBtn" type="button" aria-label="Refrescar datos ahora">
        <svg class="refresh-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 4a7 7 0 0 1 12 3"/><polyline points="2 1 2 4 5 4"/>
          <path d="M14 12a7 7 0 0 1-12-3"/><polyline points="14 15 14 12 11 12"/>
        </svg>
        <span class="refresh-label">Refrescar</span>
      </button>
    </nav>

    <main class="layout" id="mainLayout">
      <section class="workspace" id="view" tabindex="-1" aria-live="polite" aria-atomic="false"></section>

      <aside class="detail" aria-label="Detalle seleccionado">
        <div class="detail-head">
          <h2 id="detailHeading">Detalle</h2>
          <button id="clearDetail" type="button">Limpiar</button>
        </div>
        <dl>
          <div><dt>Elemento</dt><dd id="detailName">-</dd></div>
          <div><dt>Tipo</dt><dd id="detailType">-</dd></div>
          <div><dt>Estado</dt><dd id="detailState">-</dd></div>
          <div><dt>Timestamp</dt><dd id="detailTs">-</dd></div>
        </dl>
      </aside>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
