<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alumbrado TVITEC</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <a class="skip-link" href="#view">Saltar al contenido</a>

  <div class="shell">
    <header class="topbar" aria-label="Cabecera operativa">
      <div class="topbar-main">
        <div class="brand">
          <img src="/static/Logo.png" alt="TVITEC CRICURSA" class="logo">
          <div>
            <h1>Supervisión de Alumbrado de TVITEC System Glass (TSG)</h1>
          </div>
        </div>
      </div>
    </header>

    <nav class="tabs" aria-label="Vistas del dashboard">
      <button class="tab active" type="button" data-view="estado">Estado</button>
      <button class="tab" type="button" data-view="secciones">Secciones</button>
      <button class="tab" type="button" data-view="historial">Historial</button>
    </nav>

    <main class="layout" id="mainLayout">
      <section class="workspace" id="view" tabindex="-1" aria-live="polite" aria-atomic="false"></section>

      <aside class="detail" aria-label="Detalle seleccionado">
        <div class="detail-head">
          <h2 id="detailHeading">Detalle</h2>
          <button id="clearDetail" type="button">Limpiar</button>
        </div>
        <dl>
          <div><dt>Elemento</dt><dd id="detailName">-</dd></div>
          <div><dt>Tipo</dt><dd id="detailType">-</dd></div>
          <div><dt>Estado</dt><dd id="detailState">-</dd></div>
          <div><dt>Timestamp</dt><dd id="detailTs">-</dd></div>
        </dl>
      </aside>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
