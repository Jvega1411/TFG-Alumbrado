<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alumbrado TVITEC</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <a class="skip-link" href="#view">Saltar al contenido</a>

  <div class="shell">
    <header class="topbar" aria-label="Estado operativo">
      <div class="brand">
        <img src="/static/Logo.png" alt="TVITEC CRICURSA" class="logo">
        <div>
          <h1>Alumbrado TVITEC</h1>
          <p>Supervision industrial read-only</p>
        </div>
      </div>

      <div class="status-strip" aria-live="polite">
        <div class="status-item">
          <span>API</span>
          <strong id="apiStatus">PENDIENTE</strong>
        </div>
        <div class="status-item">
          <span>FINS</span>
          <strong id="finsStatus">PENDIENTE</strong>
        </div>
        <div class="status-item">
          <span>Frescura</span>
          <strong id="freshnessStatus">-</strong>
        </div>
        <div class="status-item">
          <span>Modo</span>
          <strong id="capabilityStatus">READ-ONLY</strong>
        </div>
      </div>
    </header>

    <section class="timebar" aria-label="Relojes del sistema">
      <div>
        <span>Timestamp RPi</span>
        <strong id="rpiClock">-</strong>
      </div>
      <div>
        <span>Reloj PLC</span>
        <strong id="plcClock">-</strong>
      </div>
      <div>
        <span>Ultima actualizacion UI</span>
        <strong id="uiClock">-</strong>
      </div>
    </section>

    <nav class="tabs" aria-label="Vistas del dashboard">
      <button class="tab active" type="button" data-view="resumen">Resumen</button>
      <button class="tab" type="button" data-view="secciones">Secciones</button>
      <button class="tab" type="button" data-view="horarios">Horarios</button>
      <button class="tab" type="button" data-view="historial">Historial</button>
      <button class="tab" type="button" data-view="diagnostico">Diagnostico</button>
    </nav>

    <main class="layout">
      <section class="workspace" id="view" tabindex="-1"></section>

      <aside class="detail" aria-label="Detalle seleccionado">
        <div class="detail-head">
          <h2>Detalle</h2>
          <button id="clearDetail" type="button">Limpiar</button>
        </div>
        <dl>
          <div><dt>Elemento</dt><dd id="detailName">-</dd></div>
          <div><dt>Tipo</dt><dd id="detailType">-</dd></div>
          <div><dt>Estado</dt><dd id="detailState">-</dd></div>
          <div><dt>Timestamp</dt><dd id="detailTs">-</dd></div>
        </dl>
      </aside>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
